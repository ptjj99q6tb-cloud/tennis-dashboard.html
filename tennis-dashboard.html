<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Courts</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f2f2f7;
}

.header{
background:white;
padding:18px;
text-align:center;
font-weight:600;
font-size:22px;
border-bottom:1px solid #ddd;
}

.section{
margin-top:20px;
}

.section-title{
font-size:14px;
color:#6b6b6b;
padding-left:20px;
margin-bottom:8px;
}

.card{
background:white;
margin:10px 15px;
border-radius:16px;
padding:18px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.court-name{
font-size:18px;
font-weight:600;
}

.players{
margin-top:5px;
color:#555;
}

.status{
margin-top:6px;
font-size:13px;
font-weight:600;
}

.open{
color:#34c759;
}

.inuse{
color:#ff3b30;
}

button{
margin-top:12px;
padding:8px 14px;
border:none;
border-radius:10px;
font-weight:600;
}

.assign{
background:#007aff;
color:white;
}

.clear{
background:#e5e5ea;
}

</style>
</head>

<body>

<div class="header">
🎾 Tennis Court Tracker
</div>

<div class="section">
<div class="section-title">Upper Courts</div>

<div class="card">
<div class="court-name">Court 1</div>
<div class="players" id="p1">No players</div>
<div class="status open" id="s1">Open</div>
<button class="assign" onclick="assign(1)">Assign</button>
<button class="clear" onclick="clearCourt(1)">Clear</button>
</div>

<div class="card">
<div class="court-name">Court 2</div>
<div class="players" id="p2">No players</div>
<div class="status open" id="s2">Open</div>
<button class="assign" onclick="assign(2)">Assign</button>
<button class="clear" onclick="clearCourt(2)">Clear</button>
</div>
</div>

<div class="section">
<div class="section-title">Lower Courts</div>

<div class="card">
<div class="court-name">Court 3</div>
<div class="players" id="p3">No players</div>
<div class="status open" id="s3">Open</div>
<button class="assign" onclick="assign(3)">Assign</button>
<button class="clear" onclick="clearCourt(3)">Clear</button>
</div>

<div class="card">
<div class="court-name">Court 4</div>
<div class="players" id="p4">No players</div>
<div class="status open" id="s4">Open</div>
<button class="assign" onclick="assign(4)">Assign</button>
<button class="clear" onclick="clearCourt(4)">Clear</button>
</div>

<div class="card">
<div class="court-name">Court 5</div>
<div class="players" id="p5">No players</div>
<div class="status open" id="s5">Open</div>
<button class="assign" onclick="assign(5)">Assign</button>
<button class="clear" onclick="clearCourt(5)">Clear</button>
</div>

<div class="card">
<div class="court-name">Court 6</div>
<div class="players" id="p6">No players</div>
<div class="status open" id="s6">Open</div>
<button class="assign" onclick="assign(6)">Assign</button>
<button class="clear" onclick="clearCourt(6)">Clear</button>
</div>

</div>

<script>

function assign(court){

let players = prompt("Enter players (ex: Parker vs Daniel)")

if(players){

document.getElementById("p"+court).innerText = players

let status = document.getElementById("s"+court)
status.innerText = "In Use"
status.className = "status inuse"

}

}

function clearCourt(court){

document.getElementById("p"+court).innerText = "No players"

let status = document.getElementById("s"+court)
status.innerText = "Open"
status.className = "status open"

}

</script>

</body>
</html>
