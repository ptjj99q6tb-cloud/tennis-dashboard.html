<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Team App</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#0e0e0e;
  color:white;
}

/* Header */
.header{
  padding:15px;
  font-size:20px;
  font-weight:600;
  background:#000;
  text-align:center;
  border-bottom:1px solid #222;
}

/* Pages */
.page{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

/* Cards */
.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:14px;
}

/* Map */
.map{
  width:100%;
  height:300px;
  border-radius:12px;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

/* Bottom Nav */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #222;
}

.nav-item{
  color:#888;
  font-size:12px;
  text-align:center;
}

.nav-item.active{
  color:#00e676;
}

button{
  background:none;
  border:none;
  color:inherit;
  font-size:14px;
}

/* Spacing for bottom nav */
.spacer{
  height:70px;
}
</style>
</head>

<body>

<div class="header">🎾 WCMS Tennis</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h2>Next Match</h2>
    <p>April 10 vs Central High</p>
  </div>

  <div class="card">
    <h2>Announcements</h2>
    <p>No new updates</p>
  </div>
</div>

<!-- TEAM -->
<div id="team" class="page">
  <div class="card">
    <h2>Team Roster</h2>
    <p>Player list coming soon</p>
  </div>
</div>

<!-- MAP -->
<div id="mapPage" class="page">
  <div class="card">
    <h2>Court Location</h2>
    <div class="map">
      <iframe src="https://www.google.com/maps?q=Whitley%20County%20High%20School&output=embed"></iframe>
    </div>
  </div>
</div>

<div class="spacer"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
  <div class="nav-item" onclick="showPage('team', this)">👥<br>Team</div>
  <div class="nav-item" onclick="showPage('mapPage', this)">📍<br>Map</div>
</div>

<script>
function showPage(pageId, el){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
