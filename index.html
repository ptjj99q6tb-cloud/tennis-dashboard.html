<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCMS Tennis</title>

<!-- PWA Settings -->
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;WCMS Tennis&quot;,
  &quot;short_name&quot;:&quot;Tennis&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0e0e0e&quot;,
  &quot;theme_color&quot;:&quot;#00e676&quot;
}">
<meta name="theme-color" content="#00e676">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#0e0e0e;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  background:#000;
  border-bottom:1px solid #222;
}

.page{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

.card{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:15px;
  border-radius:14px;
}

.map{
  width:100%;
  height:300px;
  border-radius:12px;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px 0;
  border-top:1px solid #222;
}

.nav-item{
  color:#888;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.nav-item.active{
  color:#00e676;
}

.spacer{
  height:70px;
}
</style>
</head>

<body>

<div class="header">🎾 WCMS Tennis</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h2>Next Match</h2>
    <p>April 10 vs Central High</p>
  </div>

  <div class="card">
    <h2>Announcements</h2>
    <p>No new updates</p>
  </div>
</div>

<!-- TEAM -->
<div id="team" class="page">
  <div class="card">
    <h2>Team</h2>
    <p>Player roster coming soon</p>
  </div>
</div>

<!-- MAP -->
<div id="map" class="page">
  <div class="card">
    <h2>Court Location</h2>
    <div class="map">
      <iframe 
        src="https://www.google.com/maps?q=Whitley%20County%20High%20School&output=embed">
      </iframe>
    </div>
  </div>
</div>

<div class="spacer"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
  <div class="nav-item" onclick="showPage('team', this)">👥<br>Team</div>
  <div class="nav-item" onclick="showPage('map', this)">📍<br>Map</div>
</div>

<script>
function showPage(id, el){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
</script>

<!-- Service Worker (for installability) -->
<script>
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('fetch', function(e) {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;

  const blob = new Blob([sw], {type: 'text/javascript'});
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
